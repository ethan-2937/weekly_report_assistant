server:
  port: ${WEEKLY_REPORT_PORT:8088}

spring:
  application:
    name: weekly-report-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/weekly_report?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_MAX_POOL_SIZE:5}
      minimum-idle: ${SPRING_DATASOURCE_MIN_IDLE:1}

weekly:
  project-root: ${WEEKLY_REPORT_ROOT:}
  frontend-dist: ${WEEKLY_FRONTEND_DIST:}
  python-bin: ${PYTHON_BIN:}
  auth:
    development-mode: ${WEEKLY_AUTH_DEVELOPMENT_MODE:false}
    jwt-secret: ${WEEKLY_JWT_SECRET:weekly-report-local-dev-secret-change-me-2026}
    token-expire-minutes: ${WEEKLY_JWT_EXPIRE_MINUTES:720}
    bootstrap-admin-username: ${WEEKLY_BOOTSTRAP_ADMIN_USERNAME:admin}
    bootstrap-admin-password: ${WEEKLY_BOOTSTRAP_ADMIN_PASSWORD:admin123}
    bootstrap-admin-real-name: ${WEEKLY_BOOTSTRAP_ADMIN_REAL_NAME:系统管理员}
    dingtalk:
      enabled: ${WEEKLY_DINGTALK_LOGIN_ENABLED:false}
      client-id: ${WEEKLY_DINGTALK_CLIENT_ID:}
      client-secret: ${WEEKLY_DINGTALK_CLIENT_SECRET:}
      redirect-uri: ${WEEKLY_DINGTALK_REDIRECT_URI:}
      frontend-url: ${WEEKLY_FRONTEND_URL:/}
      authorize-url: ${WEEKLY_DINGTALK_AUTHORIZE_URL:https://login.dingtalk.com/oauth2/auth}
      token-url: ${WEEKLY_DINGTALK_TOKEN_URL:https://api.dingtalk.com/v1.0/oauth2/userAccessToken}
      user-info-url: ${WEEKLY_DINGTALK_USER_INFO_URL:https://api.dingtalk.com/v1.0/contact/users/me}
  feedback:
    enabled: ${WEEKLY_FEEDBACK_ENABLED:true}
    recipient-name: ${WEEKLY_FEEDBACK_RECIPIENT_NAME:张艺政}
    dingtalk-user-ids: ${WEEKLY_FEEDBACK_DINGTALK_USER_IDS:}
    dingtalk-app-key: ${WEEKLY_FEEDBACK_DINGTALK_APP_KEY:}
    dingtalk-app-secret: ${WEEKLY_FEEDBACK_DINGTALK_APP_SECRET:}
    dingtalk-agent-id: ${WEEKLY_FEEDBACK_DINGTALK_AGENT_ID:}
    env-path: ${WEEKLY_FEEDBACK_ENV_PATH:}
    access-token-url: ${WEEKLY_FEEDBACK_DINGTALK_TOKEN_URL:https://api.dingtalk.com/v1.0/oauth2/accessToken}
    async-send-url: ${WEEKLY_FEEDBACK_DINGTALK_SEND_URL:https://oapi.dingtalk.com/topapi/message/corpconversation/asyncsend_v2}
  feedback-personal-message:
    mode: ${WEEKLY_FEEDBACK_PERSONAL_MESSAGE_MODE:WORK_NOTICE}
    robot-code: ${WEEKLY_FEEDBACK_DINGTALK_ROBOT_CODE:}
    robot-send-url: ${WEEKLY_FEEDBACK_DINGTALK_ROBOT_SEND_URL:https://api.dingtalk.com/v1.0/robot/oToMessages/batchSend}
  submission-reminder:
    enabled: ${WEEKLY_SUBMISSION_REMINDER_ENABLED:false}
    cron: ${WEEKLY_SUBMISSION_REMINDER_CRON:0 0 18 * * SUN}
    zone: ${WEEKLY_SUBMISSION_REMINDER_ZONE:Asia/Shanghai}
    process-timeout-seconds: ${WEEKLY_SUBMISSION_REMINDER_PROCESS_TIMEOUT_SECONDS:180}
  evaluation-feedback:
    enabled: ${WEEKLY_EVALUATION_FEEDBACK_ENABLED:false}
    cron: ${WEEKLY_EVALUATION_FEEDBACK_CRON:0 0 12 * * MON}
    zone: ${WEEKLY_EVALUATION_FEEDBACK_ZONE:Asia/Shanghai}
    hr-contact-name: ${WEEKLY_EVALUATION_FEEDBACK_HR_CONTACT:}
